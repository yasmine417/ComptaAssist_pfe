# Base de donnees - tva_db
spring.datasource.url=jdbc:postgresql://localhost:5432/tva_db
spring.datasource.username=postgres
spring.datasource.password=odoo
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - validate = Hibernate verifie que les tables existent
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway s'execute AVANT Hibernate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_tva_history

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# URLs des autres services
facture.service.url=http://localhost:8086
cabinet.service.url=http://localhost:8082

# Logging
logging.level.com.comptaassist=INFO

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Topic TVA
tva.kafka.topic.retard=tva-declarations-retard

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
